name: No more Ravines
version: 0.1.0

pipeline:
  - beet.contrib.render
  - src.plugins.no_more_ravines

meta:
  render:
    data_pack:
      - "**"
  no_more_ravines:
    base_version: "1.19"
    overlay_versions:
      v1_20_5: "1.20.5"

data_pack:
  load: src/datapack
  description: {"text":"No more Ravines\n1.19 - 26.1", "color":"gray"}
  pack_format: 10
  min_format: 10
  max_format: 101
  supported_formats:
    min_inclusive: 10
    max_inclusive: 101
  overlays:
    - directory: v1_20_5
      min_format: 41
      max_format: 101
      formats:
        min_inclusive: 41
        max_inclusive: 101

output: build
